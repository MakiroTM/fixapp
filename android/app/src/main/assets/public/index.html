    <meta charset="UTF-8" />
    <!-- Viewport ajustada para Mobile: viewport-fit=cover para o Notch do iPhone e user-scalable=no para parecer app nativo -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#4f46e5" />
    
    <!-- Script de Detecção de Tema (Executado antes do carregamento da página) -->
    <script>
      // Verifica se há preferência salva ou usa a do sistema
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      } else {
        document.documentElement.classList.remove('dark')
      }
    </script>

    <!-- iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">

    <title>FIX - Ajuda Mecânica Rápida</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              zinc: {
                750: '#333338',
                850: '#202023',
                950: '#0c0c0e',
              }
            },
            animation: {
              'page-enter': 'pageEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'fly-in-left': 'flyInLeft 1s cubic-bezier(0.22, 1, 0.36, 1) forwards',
              'fly-in-top': 'flyInTop 1s cubic-bezier(0.22, 1, 0.36, 1) forwards',
              'fly-in-right': 'flyInRight 1s cubic-bezier(0.22, 1, 0.36, 1) forwards',
              'pop-in': 'popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
              'fade-in-up': 'fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'fade-in': 'fadeIn 0.3s ease-out forwards',
              'shimmer': 'shimmer 2s infinite',
            },
            keyframes: {
              shimmer: {
                '100%': { transform: 'translateX(100%)' }
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(16px) scale(0.98)' },
                '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              pageEnter: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              flyInLeft: {
                '0%': { opacity: '0', transform: 'translate3d(-100vw, 100px, 0) rotate(-45deg) scale(2)' },
                '60%': { opacity: '1', transform: 'translate3d(10px, 0, 0) rotate(0deg) scale(1)' },
                '100%': { transform: 'translate3d(0, 0, 0)' },
              },
              flyInTop: {
                '0%': { opacity: '0', transform: 'translate3d(0, -100vh, 0) scale(0.5)' },
                '60%': { opacity: '1', transform: 'translate3d(0, 10px, 0) scale(1.2)' },
                '100%': { transform: 'translate3d(0, 0, 0) scale(1)' },
              },
              flyInRight: {
                '0%': { opacity: '0', transform: 'translate3d(100vw, -50px, 0) rotate(45deg) scale(2)' },
                '60%': { opacity: '1', transform: 'translate3d(-10px, 0, 0) rotate(0deg) scale(1)' },
                '100%': { transform: 'translate3d(0, 0, 0)' },
              },
              popIn: {
                '0%': { opacity: '0', transform: 'scale(0) translateY(20px)' },
                '100%': { opacity: '1', transform: 'scale(1) translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        overscroll-behavior-y: none; /* Previne efeito elástico do scroll no iOS */
        -webkit-tap-highlight-color: transparent; /* Remove highlight cinza ao clicar no mobile */
      }
      /* Custom scrollbar for better mobile feel */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f4f4f5; /* zinc-100 */
      }
      .dark ::-webkit-scrollbar-track {
        background: #27272a; /* zinc-800 */
      }
      ::-webkit-scrollbar-thumb {
        background: #a1a1aa; /* zinc-400 */
        border-radius: 4px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #52525b; /* zinc-600 */
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #71717a; /* zinc-500 */
      }
    </style>
